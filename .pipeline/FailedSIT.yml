     
# azure-pipelines.yml
# ======================================
# Main pipeline that calls reusable Katalon job template
# ======================================

trigger:
  - none

jobs:
  - template: template/run-testSuite.yml
    parameters:
      CollectionName: 'FailedCollectionSIT1'
      testSuiteCollectionPath: 'Test Suites/Collection/FailedCollectionSIT1'
      testRunTitle: 'FailedCollectionSIT1'
      artifactName: 'FailedCollectionSIT1'
      executionProfile: 'FinancialLinesCloud_SIT'

  - template: template/run-testSuite.yml
    parameters:
      CollectionName: 'FailedCollectionSIT2'
      testSuiteCollectionPath: 'Test Suites/Collection/FailedCollectionSIT2'
      testRunTitle: 'FailedCollectionSIT2'
      artifactName: 'FailedCollectionSIT2'
      executionProfile: 'FinancialLinesCloud_SIT'